//
// common message definitions
//

syntax = "proto3";

package proto.common;

enum OpType {
  OP_PUT     = 0;
  OP_GET     = 1;
  OP_DEL     = 2;
  OP_KEYMETA = 3; // get key meta
}

message NodeAddressPB {
  string ip   = 1;
  sint32 port = 2;
}

// GFlag RPC Messages Definition
message GFlagInfo {
  string flag_name = 1;
  string flag_value = 2;
  string flag_default_value = 3;
  string flag_type = 4;
  string flag_description = 5;
}

message GetGFlagValueRequestPB {
  string flag_name = 1;
}

message GetGFlagValueResponsePB {
  sint32 ret_code = 1;
  GFlagInfo flag_info = 2;
}

message SetGFlagValueRequestPB {
  string flag_name = 1;
  string flag_value = 2;
}

message SetGFlagValueResponsePB {
  sint32 ret_code = 1;
}

message ListAllGFlagsRequestPB {
  // just ping
}

message ListAllGFlagsResponsePB {
  sint32 ret_code = 1;
  repeated GFlagInfo flags = 2;
}

message TraceToggleRequestPB {
  bool enable_trace = 1;
}

message TraceToggleResponsePB {
  sint32 ret_code = 1;
}

// DS internal status query (for testing/debugging)
message DsStatusRequestPB {
  // empty — query all status fields
}

message DsStatusResponsePB {
  sint32 ret_code = 1;
  bool is_registered = 2;
  bool cm_ready = 3;
  uint32 heartbeat_failure_count = 4;
}

// CM internal status query (for testing/debugging)
message CmStatusRequestPB {
  // empty — query all status fields
}

message CmStatusResponsePB {
  sint32 ret_code = 1;
  bool is_running = 2;
  bool service_ready = 3;
  uint32 alive_node_count = 4;
  uint32 dead_node_count = 5;
  uint32 total_shard_count = 6;
}
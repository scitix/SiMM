//
// common message definitions
//

syntax = "proto3";

package proto.common;

enum OpType {
  OP_PUT     = 0;
  OP_GET     = 1;
  OP_DEL     = 2;
  OP_KEYMETA = 3; // get key meta
}

message NodeAddressPB {
  string ip   = 1;
  sint32 port = 2;
}

// GFlag RPC Messages Definition
message GFlagInfo {
  string flag_name = 1;
  string flag_value = 2;
  string flag_default_value = 3;
  string flag_type = 4;
  string flag_description = 5;
}

message GetGFlagValueRequestPB {
  string flag_name = 1;
}

message GetGFlagValueResponsePB {
  sint32 ret_code = 1;
  GFlagInfo flag_info = 2;
}

message SetGFlagValueRequestPB {
  string flag_name = 1;
  string flag_value = 2;
}

message SetGFlagValueResponsePB {
  sint32 ret_code = 1;
}

message ListAllGFlagsRequestPB {
  // just ping
}

message ListAllGFlagsResponsePB {
  sint32 ret_code = 1;
  repeated GFlagInfo flags = 2;
}

message TraceToggleRequestPB {
  bool enable_trace = 1;
}

message TraceToggleResponsePB {
  sint32 ret_code = 1;
}
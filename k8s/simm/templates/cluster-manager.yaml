---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: simm
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  - services
  - endpoints
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  {{ if .Values.namespace }}
  name: simm-{{ .Values.namespace }}
  {{ else }}
  name: simm
  {{ end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: simm
subjects:
- kind: ServiceAccount
  name: default
  {{ if .Values.namespace }}
  namespace: {{ .Values.namespace }}
  {{ end }}
---
apiVersion: v1
kind: Service
metadata:
  ## Define headless service name, used to create DNS records for each pod
  name: simm-clustermanager-svc
  {{ if .Values.namespace }}
  namespace: {{ .Values.namespace }}
  {{ end }}
  labels:
    {{ if .Values.namespace }}
    app: app-{{ .Values.namespace }}-simm-clustermanager-svc
    {{ else }}
    app: app-simm-clustermanager-svc
    {{ end }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.simm.clustermanagerPort }}
      name: simm-clustermanager-port
  selector:
    {{ if .Values.namespace }}
    app: app-{{ .Values.namespace }}-simm-clustermanager-svc
    {{ else }}
    app: app-simm-clustermanager-svc
    {{ end }}
---
apiVersion: apps/v1
kind: Deployment # Resource type
metadata: # Resource metadata (name, namespace, labels, etc.)
  name: simm-clustermanager # Resource name, must be unique within the namespace
  {{ if .Values.namespace }}
  namespace: {{ .Values.namespace }}
  {{ end }}
  labels:
    {{ if .Values.namespace }}
    app: app-{{ .Values.namespace }}-simm-clustermanager-svc
    {{ else }}
    app: app-simm-clustermanager-svc
    {{ end }}
spec: # Resource spec
  selector: # Label selector
    matchLabels:
      {{ if .Values.namespace }}
      app: app-{{ .Values.namespace }}-simm-clustermanager-svc
      {{ else }}
      app: app-simm-clustermanager-svc
      {{ end }}
  template: # Pod template
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{ if .Values.namespace }}
        app: app-{{ .Values.namespace }}-simm-clustermanager-svc
        {{ else }}
        app: app-simm-clustermanager-svc
        {{ end }}
    spec:
      restartPolicy: Always
      # dnsPolicy: ClusterFirstWithHostNet
      # hostIPC: true
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: simm-cluster-manager
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.simm.clustermanagerPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: APISERVER
            value: https://kubernetes.default.svc
          - name: SERVICEACCOUNT
            value: /var/run/secrets/kubernetes.io/serviceaccount
          - name: SICL_LOG_LEVEL
            value: WARN
          - name: SICL_LOG_FILE
            value: /var/log/sicl/sicl-transport-cm.log
          {{ if .Values.clustermanager_debug}}
          command: ["/bin/bash", "-c", "sysctl -w kernel.core_pattern=\"|/usr/bin/lz4 - /var/lib/systemd/coredump/core.%E.%h.lz4 -z -f\" && /workspace/build/debug/bin/cluster_manager --cm_cluster_init_grace_period_inSecs=30 --dataserver_min_num=1 && tail -f /dev/null"]
          {{ else }}
          command: ["/bin/bash", "-c", "sysctl -w kernel.core_pattern=\"|/usr/bin/lz4 - /var/lib/systemd/coredump/core.%E.%h.lz4 -z -f\" && sleep 1 && /workspace/build/release/bin/cluster_manager --cm_cluster_init_grace_period_inSecs=30 --dataserver_min_num=1"]
          {{ end }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: coredump
              mountPath: /var/lib/systemd/coredump
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
      - name: coredump
        hostPath:
          path: /var/lib/systemd/coredump
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                {{ if .Values.namespace }}
                - app-{{ .Values.namespace }}-simm-clustermanager-svc
                {{ else }}
                - app-simm-clustermanager-svc
                {{ end }}
            topologyKey: "kubernetes.io/hostname"
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

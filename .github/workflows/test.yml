# ─────────────────────────────────────────────────────────────
# SiMM CI — 编译 + 单元测试
#
# 触发：所有分支 push 及 Pull Request
# ─────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: 编译 + 单元测试
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (C++ + Python)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 系统依赖 ──────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake git curl wget lz4 \
            libgflags-dev libgoogle-glog-dev libacl1-dev \
            libprotobuf-dev protobuf-compiler \
            libcurl4-openssl-dev libssl-dev zlib1g-dev \
            libboost-all-dev libdouble-conversion-dev \
            python${{ env.PYTHON_VERSION }} \
            python${{ env.PYTHON_VERSION }}-dev \
            python${{ env.PYTHON_VERSION }}-venv

      # ── Python 虚拟环境 ───────────────────────────────────
      - name: Setup Python venv
        run: |
          python${{ env.PYTHON_VERSION }} -m venv /opt/venv
          echo "PATH=/opt/venv/bin:$PATH" >> $GITHUB_ENV
          /opt/venv/bin/pip install --upgrade pip
          /opt/venv/bin/pip install nanobind pytest pytest-asyncio \
            scikit-build-core build wheel

      # ── prometheus-cpp（第三方，需要从源码编译安装）────────
      - name: Cache prometheus-cpp
        id: cache-prometheus
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/libprometheus*
          key: prometheus-cpp-${{ runner.os }}-ubuntu22.04

      - name: Build & install prometheus-cpp
        if: steps.cache-prometheus.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/jupp0r/prometheus-cpp.git \
            third_party/prometheus-cpp
          cd third_party/prometheus-cpp
          git submodule init && git submodule update
          mkdir build && cd build
          cmake .. -DBUILD_SHARED_LIBS=ON \
                   -DENABLE_PUSH=OFF \
                   -DENABLE_COMPRESSION=OFF
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          cd ../../..
          rm -rf third_party/prometheus-cpp

      # ── SICT 网络库（从公开 OSS 下载）──────────────────────
      - name: Cache SICT library
        id: cache-sict
        uses: actions/cache@v4
        with:
          path: third_party/sict
          key: sict-ubuntu-22_04-${{ runner.os }}

      - name: Download SICT library
        if: steps.cache-sict.outputs.cache-hit != 'true'
        run: |
          wget -q --no-check-certificate \
            -O third_party/sict.tar.gz \
            "https://oss-ap-southeast.scitix.ai/hisys-simm-depository/sict/ubuntu/22_04/sict.tar.gz"
          cd third_party && tar -xzf sict.tar.gz && rm sict.tar.gz

      # ── Folly 依赖 ────────────────────────────────────────
      - name: Install Folly system dependencies
        run: |
          sudo third_party/folly/build/fbcode_builder/getdeps.py \
            install-system-deps --recursive

      # ── C++ 编译（Release + 测试开启）─────────────────────
      - name: CMake configure
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_TESTS=ON \
            -DPython_EXECUTABLE=/opt/venv/bin/python${{ env.PYTHON_VERSION }} \
            -DPython3_EXECUTABLE=/opt/venv/bin/python${{ env.PYTHON_VERSION }} \
            -Bbuild/release \
            -S.

      - name: Build
        run: cmake --build build/release -j$(nproc)

      # ── C++ 单元测试（gtest via CTest）──────────────────
      - name: Run C++ unit tests
        run: |
          cd build/release
          ctest --output-on-failure --timeout 120

      # ── Python 单元测试 ───────────────────────────────────
      - name: Run Python unit tests
        run: |
          /opt/venv/bin/pytest python/simm/tests/ -v --timeout=60
        # 若 Python 测试依赖正在运行的集群，可将 continue-on-error 设为 true
        continue-on-error: true

      # ── 上传测试报告 ──────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/release/Testing/

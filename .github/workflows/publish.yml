# ─────────────────────────────────────────────────────────────
# SiMM CD
#
# ─────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [main, master]
    tags:     ['v*.*.*']

env:
  IMAGE_NAME: simm
  PYTHON_VERSION: "3.10"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Compile Python Wheel
  # ─────────────────────────────────────────────────────────────
  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo bash ./configure.sh
          sudo apt-get update -y
          sudo apt-get install -y \
            python${{ env.PYTHON_VERSION }} \
            python${{ env.PYTHON_VERSION }}-dev \
            python${{ env.PYTHON_VERSION }}-venv

      - name: Setup Python venv
        run: |
          python${{ env.PYTHON_VERSION }} -m venv /opt/venv
          echo "PATH=/opt/venv/bin:$PATH" >> $GITHUB_ENV
          /opt/venv/bin/pip install --upgrade pip nanobind \
            scikit-build-core build wheel torch
      
      - name: Build with CMake (produces _kv.so + wheel)
        run: |
          ./build.sh --mode=release --clean --py_ver ${{ env.PYTHON_VERSION }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: simm-wheel-py${{ env.PYTHON_VERSION }}
          path: dist/*.whl
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build and push Docker image
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate image tag according to branch：
      #   push to main/master → :latest
      #   push tag v1.2.3    → :v1.2.3 + :1.2.3 + :1.2 + :latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # Job 3: upload wheel to PyPI Test
  #   run when push to tag(v*.*.*)
  # ─────────────────────────────────────────────────────────────
  publish-pypi-test:
    name: Publish to PyPI Test
    runs-on: ubuntu-22.04
    needs: build-wheel
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi-test
      url: https://test.pypi.org/project/simm/

    permissions:
      id-token: write

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: simm-wheel-py${{ env.PYTHON_VERSION }}
          path: dist/

      - name: List wheel files
        run: ls -lh dist/

      - name: Upload to PyPI Test
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.PYPI_TEST_TOKEN }}
          packages-dir: dist/
          verbose: true
          skip-existing: true

[pytest]
testpaths = tests
markers =
    requires_rdma: test requires RDMA hardware for CM/DS processes
    requires_root: test requires root privileges (iptables)
    slow: test takes more than 60 seconds
timeout = 120
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

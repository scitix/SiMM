# Multi-machine cluster topology example.
#
# Usage:
#   export SIMM_CLUSTER_CONFIG=scenarios/clusters/multi_machine.yaml
#   pytest tests/ -v --timeout=120
#
# The test runner (node A) must have passwordless SSH access to all listed hosts.
# SiMM binaries must be pre-built at the specified binary_dir on each host.

cluster:
  build_mode: release
  shard_total_num: 64

  hosts:
    cm:
      ip: "10.0.0.1"
      binary_dir: "/opt/simm/build/release/bin"
      log_dir: "/tmp/simm_test_logs"
    ds:
      - ip: "10.0.0.2"
        binary_dir: "/opt/simm/build/release/bin"
        log_dir: "/tmp/simm_test_logs"
      - ip: "10.0.0.3"
        binary_dir: "/opt/simm/build/release/bin"
        log_dir: "/tmp/simm_test_logs"
      - ip: "10.0.0.4"
        binary_dir: "/opt/simm/build/release/bin"
        log_dir: "/tmp/simm_test_logs"

  ssh:
    user: "root"
    port: 22

  cluster_manager:
    cm_cluster_init_grace_period_inSecs: 5
    cm_heartbeat_timeout_inSecs: 10
    cm_heartbeat_bg_scan_interval_inSecs: 2

  data_servers:
    count: 3
    heartbeat_cooldown_sec: 2
    register_cooldown_sec: 2
    cm_hb_tolerance_count: 5
    cm_connect_retry_interval_sec: 1
    memory_limit_bytes: 1073741824
